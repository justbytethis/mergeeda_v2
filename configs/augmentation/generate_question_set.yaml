# Configuration for AMBA Question set generation

# Hydra output directory configuration
hydra:
  run:
    dir: data/outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}

# Input: directory containing chunked markdown files
chunks_dir: "data/datasets/amba_document/processed/IHI0050H_amba_chi_architecture_spec/chunks"

# Input: directory containing extracted material files (images, tables)
materials_dir: "data/datasets/amba_document/processed/IHI0050H_amba_chi_architecture_spec/materials"

# Output directory for generated Q set JSON files
output_dir: "data/datasets/amba_document/question_set/IHI0050H_amba_chi_architecture_spec"

# Output file base name; files will be saved as {output_name}.json
output_name: "questions"

# OpenAI model to use for question generation
model:
  name: "gpt-5.1"
  # API key is read from OPENAI_API_KEY env variable if not set here
  api_key: null
  # Number of parallel worker threads for concurrent API calls
  max_workers: 20
