# Configuration for SFT training data generation from AMBA train Question files

# Hydra output directory configuration
hydra:
  run:
    dir: data/outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}

# Root directory containing per-dataset processed data (chunks, materials)
processed_dir: "data/datasets/amba_document/processed"

# Root directory for saving all generated SFT JSON files (per-dataset and merged)
output_dir: "data/datasets/amba_document/sft_data"

# One or more train Question JSON files to process (list)
train_files:
  - "data/datasets/amba_document/question_set/IHI0022L_amba_axi_protocol_spec/questions.json"
  - "data/datasets/amba_document/question_set/IHI0024E_amba_apb_architecture_spec/questions.json"
  - "data/datasets/amba_document/question_set/IHI0050H_amba_chi_architecture_spec/questions.json"
  

# Fraction of merged data used for training; remainder goes to test (must be in (0, 1)).
train_ratio: 0.7

# OpenAI model to use for answer generation
model:
  name: "gpt-5.1"
  # API key is read from OPENAI_API_KEY env variable if not set here
  api_key: null
  # Number of parallel worker threads for concurrent API calls
  max_workers: 20
