# Configuration for model evaluation on SFT test split

defaults:
  - model: qwen_vl_model

# Hydra output directory configuration
hydra:
  run:
    dir: data/outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}

# Input: SFT test split JSON file produced by generate_train_data.py
sft_test_file: "data/datasets/amba_document/sft_data/final_dataset_test.json"

# Input: root directory containing per-dataset processed data (chunks, materials)
# Each SFT item carries a dataset_name field; chunks and materials are resolved as
# processed_dir/<dataset_name>/chunks and processed_dir/<dataset_name>/materials.
processed_dir: "data/datasets/amba_document/processed"

# Output directory for preds.json and scores.json
output_dir: "data/evaluation/base_model_rag"

# If true, skip answer generation and load preds.json directly from output_dir.
skip_generation: false

# If true, the LLM judge receives the GPT-generated gold answer from the SFT
# item alongside the model's answer for comparison-based scoring.
# If false, the judge scores based on context and question alone.
use_gold_answer: false

# LLM judge model configuration (OpenAI)
judge:
  name: "gpt-5.1"
  # API key is read from OPENAI_API_KEY env variable if not set here
  api_key: null
  # Number of parallel worker threads for concurrent API calls
  max_workers: 20
